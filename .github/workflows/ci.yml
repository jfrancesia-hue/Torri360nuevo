name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm turbo build --filter=@toori360/shared --filter=@toori360/db

      - name: Generate Prisma client
        run: pnpm --filter @toori360/db db:generate

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    continue-on-error: true

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: toori360
          POSTGRES_PASSWORD: toori360
          POSTGRES_DB: toori360_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @toori360/db prisma generate
        env:
          DATABASE_URL: postgresql://toori360:toori360@localhost:5432/toori360_test

      - name: Run migrations
        run: pnpm --filter @toori360/db prisma migrate deploy
        env:
          DATABASE_URL: postgresql://toori360:toori360@localhost:5432/toori360_test

      - name: Run API tests
        run: pnpm --filter api test
        env:
          DATABASE_URL: postgresql://toori360:toori360@localhost:5432/toori360_test
          JWT_SECRET: test-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci

  deploy-api:
    name: Deploy API (Railway)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
